services:
  db:
    image: postgres:16-alpine
    container_name: biblioteca-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-biblioteca}
      POSTGRES_USER: ${DB_USER:-biblioteca}
      POSTGRES_PASSWORD: ${DB_PASS:-biblioteca}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - biblioteca_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-biblioteca} -d ${DB_NAME:-biblioteca}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: biblioteca-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-biblioteca}
      DB_USER: ${DB_USER:-biblioteca}
      DB_PASS: ${DB_PASS:-biblioteca}
      DB_SYNC: ${DB_SYNC:-alter}
      JWT_SECRET: ${JWT_SECRET:-segredo-de-desenvolvimento-projeto2-utfpr}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@biblioteca.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "${API_PORT:-3000}:3000"

  # Executa o seed (cria tabelas + usuários/livros iniciais) e finaliza.
  # Rode com: docker compose run --rm seed
  seed:
    build:
      context: ./backend
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-biblioteca}
      DB_USER: ${DB_USER:-biblioteca}
      DB_PASS: ${DB_PASS:-biblioteca}
      DB_SYNC: ${DB_SYNC:-alter}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@biblioteca.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    command: ["node", "src/seeders/seed.js"]

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: biblioteca-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  biblioteca_pgdata:
